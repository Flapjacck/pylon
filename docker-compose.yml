services:
  # Backend Service - FastAPI with Docker SDK support
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    ports:
      - "8000:8000"
    environment:
      - API_TITLE=Pylon
      - API_VERSION=0.1.0
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - CORS_ORIGINS=["http://localhost:5173", "http://frontend:5173"]
      - ENVIRONMENT=production
    volumes:
      # Mount Docker socket to allow backend to control sibling containers
      # Read-only access for safety; remove :ro if write operations needed
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - pylon-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Frontend Service - React app served via Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - pylon-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5173/" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  pylon-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16

volumes: {}
